  /movie:
    get:
      operationId: getMovie
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: string
components:
  schemas:
    Actor:
      title: Actor
      type: object
      required:
      - name
      - character
      - thumbnailUrl
      properties:
        name:
          type: string
        character:
          type: string
        thumbnailUrl:
          type: string
    Episode:
      title: Episode
      type: object
      required:
      - title
      - rating
      - description
      - thumbnailUrl
      - videoUrl
      properties:
        title:
          type: string
        rating:
          type: number
          format: float
        description:
          type: string
        thumbnailUrl:
          type: string
        videoUrl:
          type: string
    Season:
      title: Season
      type: object
      required:
      - title
      - year
      - rating
      - description
      properties:
        title:
          type: string
        year:
          type: integer
          format: int32
        rating:
          type: number
          format: float
        description:
          type: string
        thumbnailUrls:
          type: array
          items:
            type: string
        episodes:
          type: array
          items:
            $ref: '#/components/schemas/Episode'
        actors:
          type: array
          items:
            $ref: '#/components/schemas/Actor'
