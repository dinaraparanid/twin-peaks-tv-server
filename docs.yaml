              example:
                title: Season 3
                year: 2017
                rating: 8.5
                description: |-
                  The third season of Twin Peaks (also known as Twin Peaks: The Return) is a miniseries released in 2017 after a long hiatus since the conclusion of the second season. This season continues the story of Twin Peaks, bringing viewers back to the world of mystery and mysticism.

                  The plot begins with the return of FBI agent Dale Cooper to the city of Twin Peaks after many years of absence. Cooper is faced with new mysteries and mysteries, as well as the changes that have taken place in the city during his absence.
                  Over the course of the miniseries, new mysterious events and characters appear, adding new layers to the already complex plot of Twin Peaks.
                thumbnail_urls:
                - https://t9sk0mds-8080.euw.devtunnels.ms/movies/season3/thumbnail/t1.jpg
                - https://t9sk0mds-8080.euw.devtunnels.ms/movies/season3/thumbnail/t2.jpg
                - https://t9sk0mds-8080.euw.devtunnels.ms/movies/season3/thumbnail/t3.jpg
                - https://t9sk0mds-8080.euw.devtunnels.ms/movies/season3/thumbnail/t4.jpg
